<div class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <div class="welcome-icon">👋</div>
      <h2>Welcome back</h2>
      <p class="username">{{ username }}</p>
      <p class="subtitle">Select the organization you want to work with:</p>
    </div>

    <div class="modal-body">
      <p *ngIf="loading" class="loading">Loading organizations...</p>
      <p *ngIf="error" class="error">{{ error }}</p>

      <div class="companies" *ngIf="!loading && !error">
        <button
          *ngFor="let company of companies"
          class="company-card"
          (click)="selectCompany(company.id)">
          <div class="company-icon">🏢</div>
          <div class="company-info">
            <span class="company-name">{{ company.name }}</span>
            <span class="company-role">{{ company.role }}</span>
          </div>
          <div class="company-arrow">→</div>
        </button>
      </div>
    </div>

    <div class="modal-footer">
      <span class="keycloak-badge">
        🔒 Authentication provided by Keycloak
      </span>
    </div>

  </div>
</div>
