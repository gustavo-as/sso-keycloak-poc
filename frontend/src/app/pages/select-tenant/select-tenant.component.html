<div class="container">
  <h1>Select your company</h1>
  <p class="subtitle">You have access to the following organizations:</p>

  <p *ngIf="loading">Loading...</p>
  <p *ngIf="error" class="error">{{ error }}</p>

  <div class="companies" *ngIf="!loading && !error">
    <button
      *ngFor="let company of companies"
      class="company-btn"
      (click)="selectCompany(company.id)">
      {{ company.name }}
    </button>
  </div>
</div>
