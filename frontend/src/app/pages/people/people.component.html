<div class="container">
  <div class="header">
    <h1>People</h1>
    <div class="user-info">
      <span>👤 {{ username }}</span>
      <span *ngIf="isAdmin" class="badge">Admin</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </div>

  <p *ngIf="loading">Loading...</p>
  <p *ngIf="error" class="error">{{ error }}</p>

  <table *ngIf="!loading && !error">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th *ngIf="isAdmin">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let person of people">
        <td>{{ person.id }}</td>
        <td>{{ person.name }}</td>
        <td>{{ person.email }}</td>
        <td *ngIf="isAdmin">
          <button class="delete-btn" (click)="deletePerson(person.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
