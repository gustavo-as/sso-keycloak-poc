spring.application.name=sso-backend
# Server
server.port=8081

# OAuth2 Resource Server — Token Introspection
spring.security.oauth2.resourceserver.opaquetoken.introspection-uri=http://localhost:8080/realms/sso-keycloak-poc/protocol/openid-connect/token/introspect
spring.security.oauth2.resourceserver.opaquetoken.client-id=spring-client
spring.security.oauth2.resourceserver.opaquetoken.client-secret=spring-client-secret

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never